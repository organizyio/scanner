# https://embarkstudios.github.io/cargo-deny/ — advisories + license policy.

[graph]
targets = []

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Transitive via rustfft → img_hash; upgrading needs upstream releases.
ignore = [
  { id = "RUSTSEC-2023-0080", reason = "transpose 0.1.0 via rustfft/img_hash; tracked for dependency refresh" },
  { id = "RUSTSEC-2024-0436", reason = "paste unmaintained via lofty; tracked for dependency refresh" },
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "Unlicense",
  "CC0-1.0",
  "0BSD",
  "MPL-2.0",
]
confidence-threshold = 0.85

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
